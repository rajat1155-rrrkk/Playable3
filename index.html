<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Zen Bloom Puzzle</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card">
        <div class="topbar">
          <div>
            <p class="eyebrow">Playable Ad</p>
            <h1>Zen Bloom</h1>
          </div>
          <button class="ghost-button" id="resetButton" type="button">Reset</button>
        </div>

        <div class="status-row">
          <div class="status-pill">
            <span class="status-label">Moves</span>
            <strong id="movesValue">0</strong>
          </div>
          <div class="status-pill">
            <span class="status-label">Mood</span>
            <strong id="moodValue">Calm</strong>
          </div>
        </div>

        <div class="hero-panel">
          <div>
            <p class="hero-copy">Guide the stream to the lotus. Tap tiles to rotate them.</p>
            <p class="hero-subcopy" id="helperText">Make the water path glow from the spring to the flower.</p>
          </div>
          <div class="mascot" aria-hidden="true">
            <span class="mascot-face">^_^</span>
          </div>
        </div>

        <section class="board-wrap" aria-label="Zen Bloom puzzle board">
          <div class="board" id="board"></div>
          <div class="floating-badge" id="hintBadge">Tap a tile</div>
        </section>

        <div class="cta-strip">
          <button class="primary-button" id="shuffleButton" type="button">Shuffle Puzzle</button>
          <button class="secondary-button" id="hintButton" type="button">Show Hint</button>
        </div>
      </section>
    </main>

    <div class="overlay hidden" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
      <div class="overlay-card">
        <div class="petals" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="eyebrow">Puzzle Cleared</p>
        <h2 id="winTitle">The lotus is blooming</h2>
        <p class="overlay-copy">
          You restored the garden in <strong id="finalMoves">0</strong> moves. Ready for more cozy brain-teasers?
        </p>
        <div class="overlay-actions">
          <button class="primary-button" id="installButton" type="button">Install Now</button>
          <button class="secondary-button" id="playAgainButton" type="button">Play Again</button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
